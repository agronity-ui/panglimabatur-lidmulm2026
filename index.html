<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GawiLaprak Premium Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. CSS VARIABLES & THEMING
           ==========================================================================
        */
        :root {
            /* Palette: Terinspirasi dari web-design-ui.jpg & image_d98ddb.png */
            --primary: #FFC300;
            --primary-glow: #FFD700;
            --accent-orange: #FF8E00;
            --wallet-teal: #064E3B; /* Warna kartu GawiPay */
            --bg-soft: #FFF9F0;
            --bg-canvas: #FDEBD0;
            --white: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            
            /* Effects */
            --shadow-card: 0 20px 50px rgba(0,0,0,0.06);
            --shadow-glow: 0 0 30px rgba(255, 195, 0, 0.5);
            --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            --glass: rgba(255, 255, 255, 0.7);
        }

        /* ==========================================================================
           2. RESET & BASE STYLES
           ==========================================================================
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            background: var(--bg-soft);
            border-radius: 50px;
            box-shadow: 0 50px 150px rgba(0,0,0,0.12);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 90vh;
        }

        /* ==========================================================================
           3. ANIMATIONS
           ==========================================================================
        */
        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-25deg); }
            100% { transform: translateX(150%) skewX(-25deg); }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }

        @keyframes scanAnim {
            0% { top: 0%; opacity: 0; }
            50% { top: 50%; opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ==========================================================================
           4. NAVIGATION BAR
           ==========================================================================
        */
        header {
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            letter-spacing: -1px;
            cursor: pointer;
        }

        .logo span { color: var(--accent-orange); }

        nav ul {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            font-size: 15px;
            position: relative;
            transition: var(--transition);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 0;
            height: 3px;
            background: var(--primary);
            transition: var(--transition);
        }

        nav a:hover::after, nav a.active::after { width: 100%; }

        /* ==========================================================================
           5. GAWIPAY WALLET CARD (Fintech UI)
           ==========================================================================
        */
        .wallet-wrapper { padding: 0 60px 40px; }

        .gawipay-card {
            background: linear-gradient(135deg, #064E3B 0%, #065F46 100%);
            width: 100%;
            max-width: 420px;
            border-radius: 35px;
            padding: 35px;
            color: white;
            box-shadow: 0 25px 50px rgba(6, 78, 59, 0.3);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .gawipay-card:hover { transform: translateY(-5px) scale(1.02); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .brand-pay { font-weight: 800; font-size: 20px; opacity: 0.9; }

        .chip {
            width: 45px;
            height: 35px;
            background: linear-gradient(135deg, #FDE68A 0%, #F59E0B 100%);
            border-radius: 8px;
        }

        .balance-label { font-size: 12px; opacity: 0.7; letter-spacing: 1px; }
        .balance-value { font-size: 32px; font-weight: 800; margin: 5px 0 25px; }

        .card-number { font-family: monospace; font-size: 18px; letter-spacing: 3px; opacity: 0.8; }

        .wallet-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-action {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 10px 18px;
            border-radius: 15px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .btn-action:hover { background: var(--primary); color: var(--wallet-teal); }

        /* ==========================================================================
           6. PRODUCT GRID & CARDS
           ==========================================================================
        */
        .content-view { padding: 0 60px 60px; display: none; }
        .content-view.active { display: block; animation: fadeInScale 0.6s ease; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 35px;
        }

        .product-card {
            background: var(--white);
            border-radius: 40px;
            padding: 30px;
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.02);
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-15px);
            box-shadow: var(--shadow-card);
            border-color: var(--primary);
        }

        .img-container {
            background: #F9FAFB;
            border-radius: 30px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .product-card img {
            width: 80%;
            transition: var(--transition);
        }

        .product-card:hover img { transform: scale(1.1) rotate(-5deg); }

        .product-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
        .product-card .price { font-size: 22px; font-weight: 800; color: var(--accent-orange); }

        /* ==========================================================================
           7. PRODUCT DETAIL VIEW
           ==========================================================================
        */
        .detail-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 80px;
            background: var(--white);
            border-radius: 50px;
            padding: 60px;
            box-shadow: var(--shadow-card);
        }

        .gallery-side {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-bg {
            position: absolute;
            width: 450px;
            height: 450px;
            border: 2px dashed var(--primary);
            border-radius: 50%;
            z-index: 0;
        }

        .main-img {
            width: 100%;
            max-width: 500px;
            z-index: 1;
            filter: drop-shadow(0 30px 50px rgba(0,0,0,0.15));
            animation: floating 5s ease-in-out infinite;
        }

        .info-side h1 { font-size: 46px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; }
        .info-side .price-big { font-size: 38px; font-weight: 800; color: var(--accent-orange); margin-bottom: 25px; }

        .rating-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stars { color: #F59E0B; font-size: 20px; }
        .review-count { color: var(--text-muted); font-size: 14px; font-weight: 600; }

        .description {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* ==========================================================================
           8. THE YELLOW GLOW SHIMMER BUTTON
           ==========================================================================
        */
        .btn-buy {
            width: 100%;
            padding: 24px;
            background: #111827;
            color: var(--primary);
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .btn-buy:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-glow);
            color: white;
        }

        /* Shimmer Layer */
        .btn-buy::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: 0.6s;
        }

        .btn-buy:hover::before {
            left: 150%;
        }

        /* ==========================================================================
           9. FACE ID & PAYMENT OVERLAY
           ==========================================================================
        */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .face-card {
            background: white;
            padding: 60px;
            border-radius: 50px;
            text-align: center;
            width: 360px;
            animation: fadeInScale 0.5s ease;
        }

        .scanner-box {
            width: 150px;
            height: 150px;
            border: 4px solid #F3F4F6;
            border-radius: 40px;
            margin: 0 auto 40px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: #10B981;
            box-shadow: 0 0 20px #10B981;
            animation: scanAnim 2s infinite linear;
        }

        .face-svg { width: 80px; fill: none; stroke: #374151; stroke-width: 1.5; }
        .check-svg { width: 90px; fill: none; stroke: #10B981; stroke-width: 3; display: none; }

        .face-card.success .scan-line, .face-card.success .face-svg { display: none; }
        .face-card.success .check-svg { display: block; }

        /* ==========================================================================
           10. UTILITIES
           ==========================================================================
        */
        .back-btn {
            background: none; border: none; cursor: pointer;
            font-weight: 800; display: flex; align-items: center; gap: 10px;
            margin-bottom: 30px; font-size: 16px;
        }

        .review-section { margin-top: 60px; border-top: 1px solid #EEE; padding-top: 40px; }
        .review-item { background: #F9FAFB; padding: 20px; border-radius: 20px; margin-bottom: 15px; }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo" onclick="navigateTo('home')">GAWI<span>LAPRAK</span></div>
            <nav>
                <ul>
                    <li><a href="#" class="active">Koleksi</a></li>
                    <li><a href="#">Kategori</a></li>
                    <li><a href="#">Promo</a></li>
                </ul>
            </nav>
        </header>

        <main id="home-view" class="content-view active">
            <section class="wallet-wrapper">
                <div class="gawipay-card">
                    <div class="card-header">
                        <div class="brand-pay">GawiPay</div>
                        <div class="chip"></div>
                    </div>
                    <p class="balance-label">SALDO AKTIF</p>
                    <h2 class="balance-value" id="balance-display">Rp 15.000.000</h2>
                    <p class="card-number">**** **** 2026 8827</p>
                    <div class="wallet-actions">
                        <button class="btn-action">⊕ Isi Saldo</button>
                        <button class="btn-action">⇄ Kirim</button>
                    </div>
                </div>
            </section>

            <div class="grid" id="product-grid">
                </div>
        </main>

        <main id="detail-view" class="content-view">
            <button class="back-btn" onclick="navigateTo('home')">← Kembali ke Galeri</button>
            <div id="detail-container">
                </div>
        </main>
    </div>

    <div class="overlay" id="face-overlay">
        <div class="face-card" id="face-card">
            <div class="scanner-box">
                <div class="scan-line"></div>
                <svg class="face-svg" viewBox="0 0 24 24"><path d="M9 10h.01M15 10h.01M9 15c.5 1.5 1.5 2 3 2s2.5-.5 3-2M3 3h18v18H3z"></path></svg>
                <svg class="check-svg" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h2 id="status-text">Memindai Face ID...</h2>
            <p id="sub-text" style="color: #6B7280; margin-top: 10px;">Jangan gerakkan perangkat Anda</p>
        </div>
    </div>

    <script>
        // Data Produk: Menggabungkan minat akademik & fashion
        const PRODUCTS = [
            {
                id: 1,
                name: "Nike Air Max 270 'Saffron'",
                price: 2450000,
                img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=700",
                desc: "Sepatu lari revolusioner dengan bantalan udara 270 derajat. Memberikan kenyamanan maksimal untuk mahasiswa yang aktif di laboratorium maupun di lapangan.",
                rating: 5,
                reviews: [
                    { user: "Andi", text: "Keren banget buat ke kampus!" },
                    { user: "Siska", text: "Warnanya cerah, pas sama gaya saya." }
                ]
            },
            {
                id: 2,
                name: "Chemistry Lab Kit 'Tana Tidung'",
                price: 1850000,
                img: "https://images.unsplash.com/photo-1581093450021-4a7360e9a6b5?w=700",
                desc: "Set lengkap peralatan laboratorium kimia, termasuk jas lab premium dan safety goggle. Dirancang khusus untuk praktikum saponifikasi dan analisis lipid.",
                rating: 4,
                reviews: [
                    { user: "Dosen Kimia", text: "Kualitas alat standar industri." }
                ]
            },
            {
                id: 3,
                name: "Pancasila Legacy Watch",
                price: 3200000,
                img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=700",
                desc: "Jam tangan eksklusif dengan ukiran nilai-nilai kebangsaan. Hadir untuk Anda yang peduli dengan sejarah BPUPKI dan hukum Indonesia.",
                rating: 5,
                reviews: [
                    { user: "Budi", text: "Sangat elegan dan berwibawa." }
                ]
            }
        ];

        // Generate more data to reach bulk
        for(let i=4; i<=20; i++) {
            PRODUCTS.push({
                id: i,
                name: `GawiLaprak Edition #${i}`,
                price: Math.floor(Math.random() * 2000000) + 500000,
                img: `https://images.unsplash.com/photo-1549298916-b41d501d3772?w=700&sig=${i}`,
                desc: "Produk edisi terbatas dengan kualitas material terbaik. Cocok untuk menunjang gaya hidup modern di Kabupaten Tana Tidung.",
                rating: 4,
                reviews: [{ user: "User", text: "Sangat memuaskan!" }]
            });
        }

        // State
        let currentBalance = 15000000;
        let selectedProduct = null;

        // Formatter
        const idr = (v) => "Rp " + v.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

        // Navigation
        function navigateTo(view) {
            document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active'));
            document.getElementById(`${view}-view`).classList.add('active');
            window.scrollTo(0,0);
        }

        // Render Home
        function renderHome() {
            const container = document.getElementById('product-grid');
            container.innerHTML = PRODUCTS.map(p => `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <div class="img-container"><img src="${p.img}" alt="${p.name}"></div>
                    <h3>${p.name}</h3>
                    <p class="price">${idr(p.price)}</p>
                    <div class="stars">${'★'.repeat(p.rating)}${'☆'.repeat(5-p.rating)}</div>
                </div>
            `).join('');
        }

        // Render Detail
        function openProduct(id) {
            const p = PRODUCTS.find(x => x.id === id);
            selectedProduct = p;
            const container = document.getElementById('detail-container');

            container.innerHTML = `
                <div class="detail-layout">
                    <div class="gallery-side">
                        <div class="circle-bg"></div>
                        <img src="${p.img}" class="main-img" alt="${p.name}">
                    </div>
                    <div class="info-side">
                        <h1>${p.name}</h1>
                        <div class="rating-row">
                            <div class="stars">${'★'.repeat(p.rating)}${'☆'.repeat(5-p.rating)}</div>
                            <span class="review-count">| ${p.rating}.0 (${p.reviews.length} Ulasan)</span>
                        </div>
                        <p class="price-big">${idr(p.price)}</p>
                        <p class="description">${p.desc}</p>
                        
                        <button class="btn-buy" onclick="startPayment()">
                            Pesan Sekarang
                        </button>

                        <div class="review-section">
                            <h3 style="margin-bottom: 20px">Apa Kata Mereka?</h3>
                            ${p.reviews.map(r => `
                                <div class="review-item">
                                    <strong style="display:block; margin-bottom:5px;">${r.user}</strong>
                                    <p style="color: #6B7280; font-size: 14px;">"${r.text}"</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            navigateTo('detail');
        }

        // Payment Process (Face ID)
        function startPayment() {
            if(currentBalance < selectedProduct.price) {
                alert("Saldo GawiPay Anda tidak cukup.");
                return;
            }

            const overlay = document.getElementById('face-overlay');
            const card = document.getElementById('face-card');
            const status = document.getElementById('status-text');
            const sub = document.getElementById('sub-text');

            overlay.style.display = 'flex';
            card.classList.remove('success');
            status.innerText = "Memindai Face ID...";

            // Animasi Proses
            setTimeout(() => {
                card.classList.add('success');
                status.innerText = "Verifikasi Berhasil!";
                sub.innerText = "Mengamankan transaksi...";

                setTimeout(() => {
                    currentBalance -= selectedProduct.price;
                    document.getElementById('balance-display').innerText = idr(currentBalance);
                    overlay.style.display = 'none';
                    alert(`Pembayaran untuk ${selectedProduct.name} Berhasil! Terima kasih.`);
                    navigateTo('home');
                }, 1500);
            }, 2500);
        }

        // Initialize
        document.getElementById('balance-display').innerText = idr(currentBalance);
        renderHome();

    </script>
</body>
</html>
