<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GawiLaprak Shop | Premium E-Commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. CORE VARIABLES & RESET
           ========================================================================== */
        :root {
            --bg-canvas: #FFDDA6;      /* Warna luar (background body) */
            --bg-main: #FFF4E0;        /* Warna dasar aplikasi (krem) */
            --primary: #FFC300;        /* Kuning khas GawiLaprak */
            --primary-glow: #FFD700;
            --accent: #FF8E00;         /* Oranye untuk aksen harga/tombol */
            --text-dark: #2B2B2B;
            --text-muted: #8E8E8E;
            --white: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.6);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            --shadow-sm: 0 10px 20px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 15px;
        }

        /* Container Utama */
        .app-wrapper {
            width: 100%;
            max-width: 1300px;
            background: var(--bg-main);
            border-radius: 50px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            min-height: 90vh;
        }

        /* Dekorasi Lingkaran Background */
        .bg-deco {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
        }

        /* ==========================================================================
           2. HEADER & NAVIGATION
           ========================================================================== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 60px;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
        }

        .logo-box span {
            width: 8px;
            height: 8px;
            background: var(--text-dark);
            border-radius: 50%;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 15px;
            opacity: 0.6;
            transition: var(--transition);
        }

        .nav-links a.active, .nav-links a:hover {
            opacity: 1;
            color: var(--accent);
        }

        .balance-container {
            background: var(--white);
            padding: 12px 25px;
            border-radius: 25px;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .balance-container span {
            color: var(--accent);
        }

        /* ==========================================================================
           3. HOME VIEW (PRODUCT GRID)
           ========================================================================== */
        #home-view {
            padding: 0 60px 60px;
            position: relative;
            z-index: 5;
        }

        .hero-banner {
            margin-bottom: 50px;
            text-align: center;
        }

        .hero-banner h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--white);
            border-radius: 35px;
            padding: 25px;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            border: 1px solid transparent;
        }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .card-img-wrapper {
            background: #fdfdfd;
            border-radius: 25px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .card img {
            width: 85%;
            transition: var(--transition);
        }

        .card:hover img {
            transform: scale(1.1) rotate(-5deg);
        }

        .card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card .price {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .stars-small {
            color: #FFC107;
            font-size: 14px;
        }

        /* ==========================================================================
           4. PRODUCT DETAIL VIEW (SPA)
           ========================================================================== */
        #detail-view {
            display: none; /* Hidden by default */
            padding: 0 60px 60px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .back-btn {
            background: none;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            color: var(--text-dark);
        }

        .detail-layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 60px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .detail-img-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-deco {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px dashed var(--primary);
            z-index: -1;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0); } to { transform: rotate(360deg); } }

        .detail-img-container img {
            width: 100%;
            max-width: 450px;
            filter: drop-shadow(0 30px 40px rgba(0,0,0,0.2));
        }

        .detail-info h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .rating-box {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stars-large {
            color: #FFC107;
            font-size: 22px;
        }

        .price-large {
            font-size: 36px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .description {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 35px;
        }

        /* ==========================================================================
           5. SPECIAL BUTTON: YELLOW GLOW + SHIMMER
           ========================================================================== */
        .order-btn-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 50px;
        }

        .btn-shimmer {
            width: 100%;
            padding: 22px;
            background: #1a1a1a;
            color: var(--primary);
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* The Glow */
        .btn-shimmer:hover {
            transform: scale(1.02);
            box-shadow: 0 0 35px var(--primary-glow);
            color: #fff;
        }

        /* The Shimmer Effect */
        .btn-shimmer::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: 0.6s;
        }

        .btn-shimmer:hover::before {
            left: 100%;
        }

        /* ==========================================================================
           6. REVIEWS SECTION
           ========================================================================== */
        .reviews-container {
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 40px;
        }

        .reviews-container h3 {
            margin-bottom: 25px;
            font-size: 22px;
        }

        .review-card {
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
            box-shadow: var(--shadow-sm);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-canvas);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--accent);
        }

        .review-text h4 {
            font-size: 15px;
            margin-bottom: 4px;
        }

        .review-text p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ==========================================================================
           7. FACE ID OVERLAY ANIMATION
           ========================================================================== */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .overlay.active { display: flex; opacity: 1; }

        .face-card {
            background: white;
            width: 320px;
            padding: 50px 30px;
            border-radius: 40px;
            text-align: center;
            position: relative;
        }

        .scanner-frame {
            width: 120px;
            height: 120px;
            border: 3px solid #eee;
            border-radius: 30px;
            margin: 0 auto 30px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #00e676;
            box-shadow: 0 0 15px #00e676;
            animation: scanMove 2s infinite linear;
        }

        @keyframes scanMove {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .face-icon { width: 70px; height: 70px; stroke: #333; stroke-width: 1.5; fill: none; }
        .success-icon { width: 80px; height: 80px; stroke: #00e676; stroke-width: 3; fill: none; display: none; }

        /* Success State */
        .face-card.success .scan-line, .face-card.success .face-icon { display: none; }
        .face-card.success .success-icon { display: block; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        /* ==========================================================================
           8. MOBILE RESPONSIVE
           ========================================================================== */
        @media (max-width: 1024px) {
            .detail-layout { grid-template-columns: 1fr; gap: 40px; }
            header { padding: 30px; }
            .nav-links { display: none; } /* Mobile hide nav */
        }

        @media (max-width: 600px) {
            body { padding: 0; }
            .app-wrapper { border-radius: 0; }
            header { padding: 20px; }
            #home-view, #detail-view { padding: 20px; }
            .hero-banner h1 { font-size: 32px; }
            .product-grid { grid-template-columns: 1fr; }
            .detail-layout { padding: 20px; border-radius: 20px; }
            .detail-info h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="bg-deco"></div>

        <header>
            <div class="logo" onclick="switchPage('home')">
                <div class="logo-box"><span></span><span></span><span></span><span></span></div>
                GawiLaprak
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="#" class="active">Koleksi</a></li>
                    <li><a href="#">Kategori</a></li>
                    <li><a href="#">Diskon</a></li>
                    <li><a href="#">Bantuan</a></li>
                </ul>
            </nav>
            <div class="balance-container">
                Saldo: <span id="display-balance">Rp1.500.000</span>
            </div>
        </header>

        <main id="main-content">
            
            <section id="home-view">
                <div class="hero-banner">
                    <h1>Sepatu Impian Anda</h1>
                    <p>Koleksi terbaru 2026 dengan teknologi kenyamanan tingkat tinggi.</p>
                </div>
                <div class="product-grid" id="grid-container">
                    </div>
            </section>

            <section id="detail-view">
                <button class="back-btn" onclick="switchPage('home')">← Kembali Belanja</button>
                <div id="detail-render-area">
                    </div>
            </section>

        </main>
    </div>

    <div class="overlay" id="payment-overlay">
        <div class="face-card" id="face-card-box">
            <div class="scanner-frame">
                <div class="scan-line"></div>
                <svg class="face-icon" viewBox="0 0 24 24"><path d="M9 10h.01M15 10h.01M9 15c.5 1.5 1.5 2 3 2s2.5-.5 3-2M3 3h18v18H3z"></path></svg>
                <svg class="success-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h2 id="payment-status-text">Memindai Wajah...</h2>
            <p id="payment-sub-text" style="color:#666; margin-top:10px;">Harap hadapkan wajah ke kamera</p>
        </div>
    </div>

    <script>
        // 1. DATABASE PRODUK (30 Produk)
        const PRODUCTS = [
            {
                id: 1,
                name: "Nike Air Pulse 270",
                price: 2450000,
                img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=600&q=80",
                desc: "Desain revolusioner dengan bantalan udara terbesar yang pernah ada. Memberikan sensasi berjalan di atas awan. Cocok untuk lari marathon maupun gaya kasual sehari-hari.",
                rating: 5,
                reviews: [
                    { user: "Budi Santoso", text: "Keren abis! Bahannya premium dan sangat ringan.", initial: "B" },
                    { user: "Siska Khol", text: "Worth the price, pengiriman cepat.", initial: "S" }
                ]
            },
            {
                id: 2,
                name: "Adidas Ultraboost X",
                price: 2900000,
                img: "https://images.unsplash.com/photo-1608231387042-66d1773070a5?auto=format&fit=crop&w=600&q=80",
                desc: "Teknologi Boost memberikan pengembalian energi maksimal di setiap langkah. Dibuat dengan material daur ulang laut kelas atas.",
                rating: 4,
                reviews: [
                    { user: "Andi", text: "Warna putihnya bersih banget, mantap.", initial: "A" }
                ]
            },
            {
                id: 3,
                name: "Puma RS-Fast Retro",
                price: 1850000,
                img: "https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?auto=format&fit=crop&w=600&q=80",
                desc: "Gaya retro tahun 80-an dengan sentuhan modern. Warna-warna berani untuk Anda yang ingin tampil beda di keramaian.",
                rating: 4,
                reviews: [
                    { user: "Dewi", text: "Ukuran pas, desain retro-nya dapet banget.", initial: "D" }
                ]
            }
        ];

        // Generate 27 produk lainnya secara otomatis agar total 30
        for(let i = 4; i <= 30; i++) {
            PRODUCTS.push({
                id: i,
                name: `GawiLaprak Edition v.${i}`,
                price: (Math.floor(Math.random() * 25) + 5) * 100000,
                img: `https://images.unsplash.com/photo-1549298916-b41d501d3772?auto=format&fit=crop&w=600&q=80&sig=${i}`,
                desc: "Edisi terbatas khusus untuk kolektor. Dibuat dengan ketelitian tinggi dan material kulit asli yang sangat awet.",
                rating: Math.floor(Math.random() * 2) + 4, // Rating 4 atau 5
                reviews: [
                    { user: "Customer", text: "Produk original dan sangat memuaskan.", initial: "C" }
                ]
            });
        }

        // 2. STATE MANAGEMENT
        let currentBalance = 15000000; // Mulai dengan 15 Juta agar cukup untuk belanja
        let activeProduct = null;

        // 3. HELPER: FORMAT RUPIAH
        const formatIDR = (num) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        };

        // 4. NAVIGASI HALAMAN (SPA)
        function switchPage(pageId) {
            const home = document.getElementById('home-view');
            const detail = document.getElementById('detail-view');

            if(pageId === 'home') {
                home.style.display = 'block';
                detail.style.display = 'none';
                window.scrollTo(0, 0);
            } else {
                home.style.display = 'none';
                detail.style.display = 'block';
                window.scrollTo(0, 0);
            }
        }

        // 5. RENDER BERANDA
        function renderHome() {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = PRODUCTS.map(p => `
                <div class="card" onclick="openProduct(${p.id})">
                    <div class="card-img-wrapper">
                        <img src="${p.img}" alt="${p.name}">
                    </div>
                    <h3>${p.name}</h3>
                    <div class="price">${formatIDR(p.price)}</div>
                    <div class="card-meta">
                        <div class="stars-small">${'★'.repeat(p.rating)}${'☆'.repeat(5-p.rating)}</div>
                        <span style="font-size:12px; color:#999;">Lihat Detail →</span>
                    </div>
                </div>
            `).join('');
        }

        // 6. BUKA DETAIL PRODUK
        function openProduct(id) {
            const product = PRODUCTS.find(p => p.id === id);
            activeProduct = product;
            
            const area = document.getElementById('detail-render-area');
            area.innerHTML = `
                <div class="detail-layout">
                    <div class="detail-img-container">
                        <div class="circle-deco"></div>
                        <img src="${product.img}" alt="${product.name}">
                    </div>
                    <div class="detail-info">
                        <h1>${product.name}</h1>
                        <div class="rating-box">
                            <div class="stars-large">${'★'.repeat(product.rating)}${'☆'.repeat(5-product.rating)}</div>
                            <span style="color:#888;">| ${product.rating}.0 Rating Produk</span>
                        </div>
                        <div class="price-large">${formatIDR(product.price)}</div>
                        <p class="description">${product.desc}</p>
                        
                        <div class="order-btn-wrapper">
                            <button class="btn-shimmer" onclick="initiatePayment()">
                                Pesan Sekarang
                            </button>
                        </div>

                        <div class="reviews-container">
                            <h3>Ulasan Pembeli (${product.reviews.length})</h3>
                            ${product.reviews.map(r => `
                                <div class="review-card">
                                    <div class="user-avatar">${r.initial}</div>
                                    <div class="review-text">
                                        <h4>${r.user}</h4>
                                        <p>"${r.text}"</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            switchPage('detail');
        }

        // 7. PROSES PEMBAYARAN (FACE ID)
        function initiatePayment() {
            // Cek Saldo
            if(currentBalance < activeProduct.price) {
                alert("Yah! Saldo Anda tidak mencukupi untuk membeli produk ini.");
                return;
            }

            const overlay = document.getElementById('payment-overlay');
            const card = document.getElementById('face-card-box');
            const status = document.getElementById('payment-status-text');
            const sub = document.getElementById('payment-sub-text');

            // Reset UI Face ID
            card.classList.remove('success');
            status.innerText = "Memindai Wajah...";
            sub.innerText = "Harap hadapkan wajah ke kamera";
            overlay.classList.add('active');

            // Simulasi Scanning (2.5 detik)
            setTimeout(() => {
                card.classList.add('success');
                status.innerText = "Verifikasi Berhasil!";
                sub.innerText = "Pembayaran sedang dikonfirmasi...";

                // Selesaikan transaksi setelah 1.5 detik centang muncul
                setTimeout(() => {
                    currentBalance -= activeProduct.price;
                    document.getElementById('display-balance').innerText = formatIDR(currentBalance);
                    overlay.classList.remove('active');
                    alert(`Pembayaran Berhasil! ${activeProduct.name} akan segera dikirim.`);
                }, 1500);

            }, 2500);
        }

        // 8. INITIALIZE
        document.getElementById('display-balance').innerText = formatIDR(currentBalance);
        renderHome();

    </script>
</body>
</html>
