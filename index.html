<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GawiLaprak Shop - Next Gen UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. CORE SYSTEM & VARIABLES
           ========================================================================== */
        :root {
            --primary: #FFC300;
            --primary-dark: #FF8E00;
            --bg-app: #FFF9F0;
            --bg-card: #FFFFFF;
            --text-main: #1A1A1A;
            --text-sub: #6B7280;
            --wallet-dark: #1F2937; /* Dark theme untuk kartu saldo seperti di image_d98ddb.png */
            --glow: 0 0 20px rgba(255, 195, 0, 0.6);
            --shimmer: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #FDEBD0;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 30px 15px;
            min-height: 100vh;
        }

        /* Container Shell */
        .app-shell {
            width: 100%;
            max-width: 1200px;
            background: var(--bg-app);
            border-radius: 40px;
            box-shadow: 0 40px 120px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ==========================================================================
           2. HEADER & NAVIGATION
           ========================================================================== */
        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .brand span { color: var(--primary-dark); }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-sub);
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
        }

        nav a:hover, nav a.active { color: var(--primary-dark); }

        /* ==========================================================================
           3. NEW WALLET DESIGN (Inspirasi image_d98ddb.png)
           ========================================================================== */
        .wallet-section {
            padding: 0 50px 40px;
        }

        .wallet-card {
            background: var(--wallet-dark);
            border-radius: 30px;
            padding: 35px;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 450px;
        }

        /* Decorative Pattern pada Kartu */
        .wallet-card::after {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: var(--primary);
            filter: blur(80px);
            opacity: 0.15;
        }

        .wallet-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .wallet-label {
            font-size: 14px;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        .wallet-balance {
            font-size: 36px;
            font-weight: 800;
            margin-top: 5px;
        }

        .wallet-info {
            display: flex;
            gap: 40px;
            margin-top: 10px;
        }

        .info-item label {
            display: block;
            font-size: 11px;
            opacity: 0.5;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .info-item p {
            font-size: 15px;
            font-weight: 600;
        }

        /* Action Buttons (Top Up, dsb) */
        .wallet-actions {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .action-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: var(--primary);
            color: var(--wallet-dark);
        }

        /* ==========================================================================
           4. PRODUCT GRID (HOME)
           ========================================================================== */
        .section-title {
            padding: 0 50px 20px;
            font-size: 22px;
            font-weight: 800;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 50px 50px;
        }

        .product-card {
            background: white;
            border-radius: 30px;
            padding: 20px;
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.03);
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.05);
        }

        .img-holder {
            background: #FAFAFA;
            border-radius: 20px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .product-card img {
            width: 80%;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .product-card h3 { font-size: 17px; margin-bottom: 8px; }
        .product-card .price { font-weight: 800; color: var(--primary-dark); font-size: 18px; }

        /* ==========================================================================
           5. PRODUCT DETAIL PAGE (SPA)
           ========================================================================== */
        #detail-view {
            display: none;
            padding: 40px 50px;
            animation: fadeIn 0.5s ease;
        }

        .detail-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            background: white;
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.03);
        }

        .detail-gallery img {
            width: 100%;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        .detail-info h1 { font-size: 38px; line-height: 1.2; margin-bottom: 15px; }
        .detail-info .price-tag { font-size: 32px; font-weight: 800; color: var(--primary-dark); margin-bottom: 20px; }
        
        .stars { color: #FFC107; font-size: 20px; margin-bottom: 15px; }
        .desc-text { color: var(--text-sub); line-height: 1.8; margin-bottom: 30px; font-size: 15px; }

        /* Review Section */
        .review-box {
            border-top: 1px solid #EEE;
            padding-top: 25px;
            margin-top: 25px;
        }

        .review-card {
            background: #F9F9F9;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        /* ==========================================================================
           6. THE YELLOW GLOW SHIMMER BUTTON
           ========================================================================== */
        .btn-order {
            width: 100%;
            padding: 22px;
            background: #111;
            color: var(--primary);
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .btn-order:hover {
            transform: scale(1.02);
            color: white;
            box-shadow: var(--glow);
        }

        .btn-order::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: var(--shimmer);
            transition: 0.7s;
        }

        .btn-order:hover::before { left: 100%; }

        /* ==========================================================================
           7. UTILS
           ========================================================================== */
        .back-btn {
            background: none; border: none; cursor: pointer;
            font-weight: 700; display: flex; align-items: center; gap: 8px;
            margin-bottom: 25px; color: var(--text-main);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .detail-wrapper { grid-template-columns: 1fr; padding: 30px; }
            header, .wallet-section, .grid-container, #detail-view { padding: 20px; }
            .wallet-card { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <header>
            <div class="brand" onclick="navigate('home')">GAWI<span>LAPRAK</span></div>
            <nav>
                <ul>
                    <li><a href="#" class="active">Shop</a></li>
                    <li><a href="#">Category</a></li>
                    <li><a href="#">Help</a></li>
                </ul>
            </nav>
        </header>

        <main id="home-view">
            <section class="wallet-section">
                <div class="wallet-card">
                    <div class="wallet-header">
                        <div>
                            <p class="wallet-label">TOTAL SALDO</p>
                            <h2 class="wallet-balance" id="balance-val">Rp 12.450.000</h2>
                        </div>
                        <div style="font-weight: 800; font-style: italic; font-size: 18px; color: var(--primary);">GawiPay</div>
                    </div>
                    
                    <div class="wallet-info">
                        <div class="info-item">
                            <label>Nomor Kartu</label>
                            <p>**** **** 8827</p>
                        </div>
                        <div class="info-item">
                            <label>Berlaku Hingga</label>
                            <p>05/28</p>
                        </div>
                    </div>

                    <div class="wallet-actions">
                        <button class="action-btn">⊕ Top Up</button>
                        <button class="action-btn">⇄ Transfer</button>
                        <button class="action-btn">▤ Riwayat</button>
                    </div>
                </div>
            </section>

            <h2 class="section-title">Produk Terbaru</h2>
            <div class="grid-container" id="product-grid"></div>
        </main>

        <main id="detail-view">
            <button class="back-btn" onclick="navigate('home')">← Kembali</button>
            <div id="detail-content"></div>
        </main>
    </div>

    <script>
        // Data Produk
        const PRODUCTS = [
            {
                id: 1,
                name: "Nike Air Max 270 Premium",
                price: 2450000,
                img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600",
                desc: "Desain ikonik dengan unit Air Max di tumit untuk kenyamanan maksimal sepanjang hari. Menggunakan material mesh breathable yang menjaga kaki tetap sejuk.",
                rating: 5,
                reviews: ["Barangnya asli, pengiriman super cepat!", "Nyaman banget dipake lari pagi."]
            },
            {
                id: 2,
                name: "Lab Safety Kit Pro",
                price: 850000,
                img: "https://images.unsplash.com/photo-1582719508461-905c673771fd?w=600",
                desc: "Perlengkapan standar untuk praktikum Kimia. Termasuk jas lab anti-asam, kacamata pelindung, dan sarung tangan nitril.",
                rating: 4,
                reviews: ["Wajib punya buat mahasiswa Kimia!", "Ukuran jas lab pas banget."]
            },
            {
                id: 3,
                name: "Pancasilaku Edition Watch",
                price: 1200000,
                img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600",
                desc: "Jam tangan edisi spesial bertema Hukum & Kewarganegaraan. Elegan dan berwibawa.",
                rating: 5,
                reviews: ["Desainnya sangat nasionalis.", "Keren buat dipake ke kampus."]
            }
        ];

        // Generate more products
        for(let i=4; i<=12; i++) {
            PRODUCTS.push({
                id: i,
                name: `Lifestyle Item #${i}`,
                price: Math.floor(Math.random() * 2000000) + 500000,
                img: `https://images.unsplash.com/photo-1549298916-b41d501d3772?w=600&sig=${i}`,
                desc: "Produk berkualitas tinggi dengan desain minimalis modern yang cocok untuk aktivitas sehari-hari di wilayah Tana Tidung.",
                rating: 4,
                reviews: ["Produk bagus!", "Sesuai deskripsi."]
            });
        }

        const formatIDR = (n) => "Rp " + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

        function navigate(view) {
            document.getElementById('home-view').style.display = view === 'home' ? 'block' : 'none';
            document.getElementById('detail-view').style.display = view === 'detail' ? 'block' : 'none';
            window.scrollTo(0,0);
        }

        function renderHome() {
            const container = document.getElementById('product-grid');
            container.innerHTML = PRODUCTS.map(p => `
                <div class="product-card" onclick="openDetail(${p.id})">
                    <div class="img-holder"><img src="${p.img}"></div>
                    <h3>${p.name}</h3>
                    <div class="price">${formatIDR(p.price)}</div>
                    <div class="stars">${'★'.repeat(p.rating)}${'☆'.repeat(5-p.rating)}</div>
                </div>
            `).join('');
        }

        function openDetail(id) {
            const p = PRODUCTS.find(x => x.id === id);
            const content = document.getElementById('detail-content');
            
            content.innerHTML = `
                <div class="detail-wrapper">
                    <div class="detail-gallery">
                        <img src="${p.img}">
                    </div>
                    <div class="detail-info">
                        <h1>${p.name}</h1>
                        <div class="stars">${'★'.repeat(p.rating)}${'☆'.repeat(5-p.rating)} (4.5)</div>
                        <div class="price-tag">${formatIDR(p.price)}</div>
                        <p class="desc-text">${p.desc}</p>
                        
                        <button class="btn-order" onclick="processOrder('${p.name}')">
                            Pesan Sekarang
                        </button>

                        <div class="review-box">
                            <h4 style="margin-bottom:15px">Ulasan Pembeli</h4>
                            ${p.reviews.map(r => `<div class="review-card">"${r}"</div>`).join('')}
                        </div>
                    </div>
                </div>
            `;
            navigate('detail');
        }

        function processOrder(name) {
            alert(`Pesanan ${name} sedang diproses dengan GawiPay!`);
        }

        // Init
        renderHome();
    </script>
</body>
</html>
